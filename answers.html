<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Answers - Digital Literacy Course</title>
    <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light');document.documentElement.style.fontSize=(localStorage.getItem('textSize')||'100')+'%';</script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <span class="logo-icon">📚</span>
                <span class="logo-text">Digital Literacy</span>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="lessons.html" class="nav-link">Lessons</a>
                <a href="typing.html" class="nav-link">Typing</a>
                <a href="quizzes.html" class="nav-link">Quizzes</a>
                <a href="progress.html" class="nav-link">Progress</a>
                <div class="nav-dropdown">
                    <button class="nav-link dropdown-btn">More <span class="dropdown-icon">▼</span></button>
                    <div class="dropdown-menu">
                        <a href="messages.html" class="dropdown-item">Messages</a>
                        <a href="teacher.html" class="dropdown-item">Teacher</a>
                        <a href="answers.html" class="dropdown-item active">Answers</a>
                        <a href="admin.html" class="dropdown-item">Admin</a>
                        <a href="help.html" class="dropdown-item">Help</a>
                        <a href="settings.html" class="dropdown-item">Settings</a>
                        <a href="privacy.html" class="dropdown-item">Privacy</a>
                    </div>
                </div>
            </div>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                    <span class="theme-icon" id="themeIcon">🌙</span>
                </button>
                <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>

    <main class="main-container">
        <section style="padding: var(--spacing-3xl) 0; max-width: 900px; margin: 0 auto;">
            <h1 class="section-title fade-in">📋 Student Answers</h1>
            <div id="namesBanner" class="fade-in" style="text-align:center;margin-bottom:var(--spacing-2xl);"></div>

            <!-- Quiz Answers Section -->
            <h2 class="fade-in" style="font-size:1.2rem;margin-bottom:var(--spacing-lg);">📝 Quiz Answers</h2>
            <div id="quizAnswersContainer" class="fade-in" style="display:flex;flex-direction:column;gap:var(--spacing-md);margin-bottom:var(--spacing-3xl);"></div>

            <!-- Typing Results Section -->
            <h2 class="fade-in" style="font-size:1.2rem;margin-bottom:var(--spacing-lg);">⌨️ Typing Results</h2>
            <div id="typingAnswersContainer" class="fade-in" style="display:flex;flex-direction:column;gap:var(--spacing-md);margin-bottom:var(--spacing-3xl);"></div>

            <!-- Add Comment Section -->
            <h2 class="fade-in" style="font-size:1.2rem;margin-bottom:var(--spacing-lg);">💬 Add Teacher Comment</h2>
            <div class="card fade-in" style="padding:var(--spacing-lg);">
                <div style="display:flex;gap:var(--spacing-sm);flex-wrap:wrap;margin-bottom:var(--spacing-md);">
                    <select id="commentTarget" style="flex:1;min-width:200px;padding:8px 12px;border-radius:var(--radius-sm);border:1px solid var(--border-color);background:var(--bg-secondary);color:var(--text-primary);font-size:0.95rem;">
                        <option value="">Select quiz or typing session...</option>
                    </select>
                </div>
                <textarea id="commentInput" rows="3" placeholder="Write your comment here..." style="width:100%;padding:12px 14px;border:1px solid var(--border-color);border-radius:var(--radius-md);font-size:1rem;background:var(--bg-primary);color:var(--text-primary);resize:vertical;font-family:inherit;margin-bottom:var(--spacing-sm);"></textarea>
                <div style="display:flex;justify-content:flex-end;">
                    <button class="btn btn-primary" id="saveCommentBtn">Save Comment</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 Digital Literacy Course. Created by Steve &amp; Jass.</p>
            <div class="footer-links">
                <a href="help.html">Help</a>
                <a href="settings.html">Settings</a>
                <a href="privacy.html">Privacy</a>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/db.js"></script>
    <script src="js/darkmode.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script>
    /* ---- Answers page controller ---- */
    var _comments = {};
    var _commentOptions = [];

    function loadComments() {
        try { return JSON.parse(localStorage.getItem('dlc_teacher_comments') || '{}'); } catch(e) { return {}; }
    }
    function saveComments(obj) {
        localStorage.setItem('dlc_teacher_comments', JSON.stringify(obj));
        if (typeof dbSaveComment === 'function') {
            Object.entries(obj).forEach(function(entry) {
                dbSaveComment({ id: entry[0], targetKey: entry[0], text: entry[1], teacherName: localStorage.getItem('dlc_teacher_name') || 'Teacher', createdAt: new Date().toISOString() }).catch(function() {});
            });
        }
    }

    function safeHtml(str) {
        var d = document.createElement('div');
        d.appendChild(document.createTextNode(str || ''));
        return d.innerHTML;
    }

    function buildCommentBlock(commentKey, label) {
        var text = _comments[commentKey] || '';
        var html = '';
        if (text) {
            html += '<div class="comment-block" id="cmtblock-' + safeId(commentKey) + '" style="margin-top:12px;padding:10px 14px;background:var(--accent-light);border-radius:var(--radius-sm);border-left:3px solid var(--accent-color);">' +
                '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">' +
                    '<p style="font-size:0.82rem;font-weight:600;color:var(--accent-color);margin:0;">💬 Teacher Comment:</p>' +
                    '<div style="display:flex;gap:6px;">' +
                        '<button class="btn btn-secondary" style="padding:3px 10px;font-size:0.78rem;" onclick="editComment(\'' + esc(commentKey) + '\')">Edit</button>' +
                        '<button class="btn btn-danger"    style="padding:3px 10px;font-size:0.78rem;" onclick="deleteComment(\'' + esc(commentKey) + '\')">Remove</button>' +
                    '</div>' +
                '</div>' +
                '<p style="font-size:0.9rem;color:var(--text-primary);margin:0;" id="cmttext-' + safeId(commentKey) + '">' + safeHtml(text) + '</p>' +
            '</div>';
        }
        return html;
    }

    function safeId(key) { return key.replace(/[^a-zA-Z0-9_-]/g, '_'); }
    function esc(str) { return String(str).replace(/'/g, "\\'"); }

    function editComment(commentKey) {
        var current = _comments[commentKey] || '';
        var newText = prompt('Edit comment:', current);
        if (newText === null) return;
        newText = newText.trim();
        if (!newText) { deleteComment(commentKey); return; }
        _comments[commentKey] = newText;
        saveComments(_comments);
        refreshCommentBlock(commentKey);
    }

    function deleteComment(commentKey) {
        if (!confirm('Remove this comment?')) return;
        delete _comments[commentKey];
        saveComments(_comments);
        var block = document.getElementById('cmtblock-' + safeId(commentKey));
        if (block) block.remove();
    }

    function refreshCommentBlock(commentKey) {
        var block = document.getElementById('cmtblock-' + safeId(commentKey));
        var text = _comments[commentKey] || '';
        if (block) {
            var textEl = document.getElementById('cmttext-' + safeId(commentKey));
            if (textEl) textEl.textContent = text;
        }
    }

    function saveTypingScore(sessionIdx) {
        var input = document.getElementById('typingscore-' + sessionIdx);
        if (!input) return;
        var score = parseInt(input.value, 10);
        if (isNaN(score) || score < 0 || score > 100) { showAnswersToast('Enter a score between 0 and 100.', 'info'); return; }
        var progress = loadProgress();
        if (!progress.typingStats || !progress.typingStats.sessions) return;
        var sessions = progress.typingStats.sessions;
        var realIdx = sessions.length - 1 - sessionIdx;
        if (!sessions[realIdx]) return;
        sessions[realIdx].teacherScore = score;
        saveProgress(progress);
        var displayEl = document.getElementById('typingscoredisplay-' + sessionIdx);
        if (displayEl) {
            displayEl.innerHTML = '<span class="badge badge-success">Teacher Score: ' + score + '%</span>';
        }
        showAnswersToast('Score saved ✓', 'success');
    }

    function showAnswersToast(msg, type) {
        var t = document.createElement('div');
        t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:' +
            (type === 'success' ? 'var(--success-color)' : 'var(--accent-color)') +
            ';color:white;padding:12px 24px;border-radius:8px;box-shadow:var(--shadow-lg);z-index:9999;font-weight:500;font-size:0.95rem;';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(function() { if (t.parentNode) t.remove(); }, 2500);
    }

    document.addEventListener('DOMContentLoaded', function() {
        _comments = loadComments();
        var progress = loadProgress();
        var studentName = (progress.profile && progress.profile.name) ? progress.profile.name : 'Student';
        var teacherName = localStorage.getItem('dlc_teacher_name') || 'Teacher';

        var namesBanner = document.getElementById('namesBanner');
        if (namesBanner) {
            namesBanner.innerHTML =
                '<p style="font-size:0.95rem;color:var(--text-secondary);margin-bottom:4px;">Teacher: <strong style="color:var(--text-primary);">' + safeHtml(teacherName) + '</strong></p>' +
                '<p style="font-size:1.25rem;font-weight:700;color:var(--text-primary);">Student: ' + safeHtml(studentName) + '</p>';
        }

        var allLessons = (typeof getAllLessons === 'function') ? getAllLessons() : (typeof LESSONS !== 'undefined' ? LESSONS : []);
        var quizContainer = document.getElementById('quizAnswersContainer');
        var commentTarget = document.getElementById('commentTarget');

        /* --- Quiz Answers --- */
        if (quizContainer) {
            var hasQuiz = false;
            allLessons.forEach(function(lesson) {
                var qa = progress.quizAnswers && progress.quizAnswers[lesson.id];
                var score = progress.quizScores && progress.quizScores[lesson.id];
                if (score === undefined || score === null) return;
                hasQuiz = true;
                var passed = score >= 70;
                var submittedDate = (qa && qa.submittedAt) ? new Date(qa.submittedAt).toLocaleString() : 'Unknown';
                var commentKey = 'quiz_' + lesson.id;

                var answersHtml = '';
                if (qa && lesson.quiz && lesson.quiz.questions) {
                    answersHtml = lesson.quiz.questions.map(function(q, qi) {
                        var selected = (qa.selectedAnswers !== undefined) ? qa.selectedAnswers[qi] : -1;
                        var isCorrect = selected === q.answer;
                        var selectedText = (selected >= 0 && q.options && q.options[selected]) ? q.options[selected] : 'No answer';
                        var correctText = (q.options && q.options[q.answer]) ? q.options[q.answer] : '';
                        return '<div style="padding:8px 0;border-bottom:1px solid var(--border-color);">' +
                            '<p style="font-weight:600;font-size:0.9rem;margin-bottom:4px;">Q' + (qi+1) + ': ' + safeHtml(q.question) + '</p>' +
                            '<p style="font-size:0.88rem;color:' + (isCorrect ? 'var(--success-color)' : 'var(--danger-color)') + ';">' +
                                (isCorrect ? '✓ ' : '✗ ') + safeHtml(selectedText) +
                            '</p>' +
                            (correctText && !isCorrect ? '<p style="font-size:0.82rem;color:var(--text-secondary);">Correct: ' + safeHtml(correctText) + '</p>' : '') +
                        '</div>';
                    }).join('');
                }

                var commentHtml = buildCommentBlock(commentKey, 'Quiz ' + lesson.id);
                var cardId = 'quizcard-' + lesson.id;

                quizContainer.innerHTML +=
                    '<div class="card" id="' + cardId + '" style="padding:var(--spacing-lg);">' +
                        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">' +
                            '<h3 style="font-size:1rem;">Quiz ' + lesson.id + ' — ' + safeHtml(lesson.title) + '</h3>' +
                            '<div style="display:flex;gap:6px;">' +
                                '<span class="badge ' + (passed ? 'badge-success' : 'badge-danger') + '">' + score + '%</span>' +
                                '<span class="badge ' + (passed ? 'badge-green' : 'badge-orange') + '">' + (passed ? '✓ Passed' : '✗ Failed') + '</span>' +
                            '</div>' +
                        '</div>' +
                        '<p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:12px;">Submitted: ' + submittedDate + '</p>' +
                        answersHtml +
                        commentHtml +
                    '</div>';

                _commentOptions.push({ value: commentKey, label: 'Quiz ' + lesson.id + ' — ' + lesson.title });
            });
            if (!hasQuiz) {
                quizContainer.innerHTML = '<p style="color:var(--text-secondary);font-size:0.95rem;">No quiz answers yet.</p>';
            }
        }

        /* --- Typing Results --- */
        var typingContainer = document.getElementById('typingAnswersContainer');
        if (typingContainer) {
            var sessions = progress.typingStats && progress.typingStats.sessions;
            if (sessions && sessions.length > 0) {
                sessions.slice().reverse().forEach(function(s, i) {
                    var sessionDate = s.date ? new Date(s.date).toLocaleString() : 'Unknown';
                    var commentKey = 'typing_' + (sessions.length - 1 - i);
                    var commentHtml = buildCommentBlock(commentKey, 'Typing Session ' + (sessions.length - i));
                    var teacherScore = s.teacherScore !== undefined ? s.teacherScore : null;

                    typingContainer.innerHTML +=
                        '<div class="card" style="padding:var(--spacing-lg);">' +
                            '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px;">' +
                                '<h3 style="font-size:1rem;">Typing Session ' + (sessions.length - i) + '</h3>' +
                                '<span style="font-size:0.85rem;color:var(--text-secondary);">' + sessionDate + '</span>' +
                            '</div>' +
                            '<div style="display:flex;gap:var(--spacing-lg);flex-wrap:wrap;margin-bottom:10px;">' +
                                '<div><span style="font-weight:600;color:var(--accent-color);">' + s.wpm + '</span> WPM</div>' +
                                '<div><span style="font-weight:600;color:var(--success-color);">' + s.accuracy + '%</span> Accuracy</div>' +
                            '</div>' +
                            '<div id="typingscoredisplay-' + i + '" style="margin-bottom:10px;">' +
                                (teacherScore !== null
                                    ? '<span class="badge badge-success">Teacher Score: ' + teacherScore + '%</span>'
                                    : '<span style="font-size:0.82rem;color:var(--text-secondary);">No teacher score yet</span>'
                                ) +
                            '</div>' +
                            '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">' +
                                '<label style="font-size:0.85rem;font-weight:600;color:var(--text-secondary);">Score (0–100):</label>' +
                                '<input type="number" id="typingscore-' + i + '" min="0" max="100" value="' + (teacherScore !== null ? teacherScore : '') + '" placeholder="e.g. 85" style="width:90px;padding:5px 10px;border:1px solid var(--border-color);border-radius:var(--radius-sm);font-size:0.9rem;background:var(--bg-primary);color:var(--text-primary);">' +
                                '<button class="btn btn-primary" style="padding:5px 14px;font-size:0.85rem;" onclick="saveTypingScore(' + i + ')">Save Score</button>' +
                            '</div>' +
                            commentHtml +
                        '</div>';

                    _commentOptions.push({ value: commentKey, label: 'Typing Session ' + (sessions.length - i) });
                });
            } else {
                typingContainer.innerHTML = '<p style="color:var(--text-secondary);font-size:0.95rem;">No typing sessions yet.</p>';
            }
        }

        /* --- Populate comment target dropdown --- */
        if (commentTarget) {
            _commentOptions.forEach(function(opt) {
                var el = document.createElement('option');
                el.value = opt.value;
                el.textContent = opt.label;
                commentTarget.appendChild(el);
            });
        }

        /* --- Save comment handler --- */
        var saveBtn = document.getElementById('saveCommentBtn');
        if (saveBtn) {
            saveBtn.addEventListener('click', function() {
                var target = commentTarget ? commentTarget.value : '';
                var text = document.getElementById('commentInput') ? document.getElementById('commentInput').value.trim() : '';
                if (!target) { showAnswersToast('Please select a quiz or typing session.', 'info'); return; }
                if (!text)   { showAnswersToast('Please enter a comment.', 'info'); return; }

                _comments[target] = text;
                saveComments(_comments);
                document.getElementById('commentInput').value = '';
                commentTarget.value = '';

                /* Inject or refresh the comment block directly in the relevant card */
                var blockId = 'cmtblock-' + safeId(target);
                var existing = document.getElementById(blockId);
                if (existing) {
                    var textEl = document.getElementById('cmttext-' + safeId(target));
                    if (textEl) textEl.textContent = text;
                } else {
                    /* Find the card that contains this target and append the block */
                    var newHtml = buildCommentBlock(target, target);
                    if (target.startsWith('quiz_')) {
                        var lessonId = target.replace('quiz_', '');
                        var card = document.getElementById('quizcard-' + lessonId);
                        if (card) card.insertAdjacentHTML('beforeend', newHtml);
                    } else if (target.startsWith('typing_')) {
                        var cards = document.querySelectorAll('#typingAnswersContainer .card');
                        var sessionIdx = parseInt(target.replace('typing_', ''), 10);
                        var reversedIdx = (sessions ? sessions.length - 1 - sessionIdx : 0);
                        if (cards[reversedIdx]) cards[reversedIdx].insertAdjacentHTML('beforeend', newHtml);
                    }
                }
                showAnswersToast('Comment saved ✓', 'success');
            });
        }
    });
    </script>
</body>
</html>
