<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile – Digital Literacy</title>
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light');document.documentElement.style.fontSize=(localStorage.getItem('textSize')||'100')+'%';</script>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/mobile.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <header class="topbar" id="topbar"></header>
      <main class="page-content">
        <div class="card fade-in" style="max-width:480px;margin:0 auto;">
          <h2 class="section-title mb-6" style="font-size:1.5rem;">Your Profile</h2>
          <p style="color:var(--text-secondary);margin-bottom:var(--spacing-xl);font-size:0.95rem;">Tell us your name so we can personalise your experience!</p>
          <div class="mb-4">
            <label>Your Name</label>
            <input type="text" id="profileName" placeholder="e.g. Margaret or John" />
          </div>
          <div class="mb-6">
            <label>Start Date</label>
            <input type="text" id="profileDate" readonly />
          </div>
          <button class="btn btn-primary btn-full" onclick="saveProfile()">Save Profile</button>
          <div id="profileMsg" class="mt-3 text-muted" style="min-height:24px;font-size:0.9rem;text-align:center;"></div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/db.js"></script>
  <script src="js/darkmode.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/wasm.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      buildTopBar('Profile');
      var p = loadProgress();
      var nameEl = document.getElementById('profileName');
      var dateEl = document.getElementById('profileDate');
      if (nameEl) nameEl.value = p.profile.name || '';
      if (dateEl) dateEl.value = p.profile.joinDate ? new Date(p.profile.joinDate).toLocaleDateString() : 'Not set yet';
    });

    function saveProfile() {
      var p = loadProgress();
      var name = document.getElementById('profileName').value.trim();
      if (!name) {
        if (typeof toast === 'function') toast('Please enter your name', 'error');
        return;
      }
      p.profile.name = name;
      if (!p.profile.joinDate) p.profile.joinDate = Date.now();
      saveProgress(p);
      var dateEl = document.getElementById('profileDate');
      if (dateEl) dateEl.value = new Date(p.profile.joinDate).toLocaleDateString();
      var msg = document.getElementById('profileMsg');
      if (msg) msg.textContent = '✓ Profile saved!';
      if (typeof toast === 'function') toast('Profile saved!', 'success');
    }
  </script>
</body>
</html>
