<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lessons – Digital Literacy</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/mobile.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <header class="topbar" id="topbar"></header>
      <main class="page-content">
        <div class="card-header mb-4 fade-in">
          <h2 class="section-title">All Lessons</h2>
        </div>
        <!-- Module filter -->
        <div id="moduleFilters" class="btn-group mb-6 fade-in stagger-1">
          <button class="btn btn-secondary module-filter active" data-module="All">All Lessons</button>
        </div>

        <!-- Lesson grid -->
        <div class="grid-auto" id="lessonGrid"></div>
      </main>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/db.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/wasm.js"></script>
  <script src="js/app.js"></script>
  <script src="js/lessons.js"></script>
</body>
</html>
