<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Digital Literacy Course</title>
    <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light');document.documentElement.style.fontSize=(localStorage.getItem('textSize')||'100')+'%';</script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <span class="logo-icon">📚</span>
                <span class="logo-text">Digital Literacy</span>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="lessons.html" class="nav-link">Lessons</a>
                <a href="typing.html" class="nav-link">Typing</a>
                <a href="quizzes.html" class="nav-link">Quizzes</a>
                <a href="progress.html" class="nav-link">Progress</a>
                <div class="nav-dropdown">
                    <button class="nav-link dropdown-btn">More <span class="dropdown-icon">▼</span></button>
                    <div class="dropdown-menu">
                        <a href="messages.html" class="dropdown-item active">Messages</a>
                        <a href="teacher.html" class="dropdown-item">Teacher</a>
                        <a href="admin.html" class="dropdown-item">Admin</a>
                        <a href="help.html" class="dropdown-item">Help</a>
                        <a href="settings.html" class="dropdown-item">Settings</a>
                        <a href="privacy.html" class="dropdown-item">Privacy</a>
                    </div>
                </div>
            </div>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                    <span class="theme-icon" id="themeIcon">🌙</span>
                </button>
                <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>

    <main class="main-container">
        <section style="padding: var(--spacing-3xl) 0; max-width: 720px; margin: 0 auto;">
            <h1 class="section-title fade-in">📬 Messages</h1>
            <div id="msgUserName" class="fade-in" style="text-align:center;margin-bottom:var(--spacing-md);"></div>
            <p class="fade-in" style="text-align:center;color:var(--text-secondary);margin-bottom:var(--spacing-xl);font-size:1.05rem;">
                Post messages for your class. Newest messages appear first.
            </p>

            <!-- Role selector -->
            <div class="card fade-in" style="margin-bottom:var(--spacing-lg);padding:var(--spacing-lg);">
                <div style="display:flex;align-items:center;gap:var(--spacing-md);flex-wrap:wrap;margin-bottom:var(--spacing-md);">
                    <label style="font-weight:600;font-size:0.95rem;">Posting as:</label>
                    <select id="roleSelect" style="padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border-color);background:var(--bg-secondary);color:var(--text-primary);font-size:0.95rem;">
                        <option value="student">👤 Student</option>
                        <option value="teacher">👩‍🏫 Teacher</option>
                    </select>
                    <span id="posterName" style="color:var(--text-secondary);font-size:0.9rem;"></span>
                </div>
                <div style="display:flex;gap:var(--spacing-sm);">
                    <textarea id="msgInput" rows="3" placeholder="Type your message here..." style="flex:1;padding:12px 14px;border:1px solid var(--border-color);border-radius:var(--radius-md);font-size:1rem;background:var(--bg-primary);color:var(--text-primary);resize:vertical;font-family:inherit;min-height:60px;"></textarea>
                </div>
                <div style="display:flex;justify-content:flex-end;margin-top:var(--spacing-sm);">
                    <button class="btn btn-primary" id="sendMsgBtn">Send Message</button>
                </div>
            </div>

            <!-- Messages list -->
            <div id="messagesContainer" class="fade-in" style="display:flex;flex-direction:column;gap:var(--spacing-md);"></div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 Digital Literacy Course. Created by Steve &amp; Jass.</p>
            <div class="footer-links">
                <a href="help.html">Help</a>
                <a href="settings.html">Settings</a>
                <a href="privacy.html">Privacy</a>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/db.js"></script>
    <script src="js/darkmode.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/messages.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var roleSelect = document.getElementById('roleSelect');
            var posterName = document.getElementById('posterName');
            var sendBtn = document.getElementById('sendMsgBtn');
            var msgInput = document.getElementById('msgInput');

            // Restore last role
            var savedRole = getCurrentRole();
            if (roleSelect) roleSelect.value = savedRole;
            updatePosterName();

            roleSelect.addEventListener('change', function() {
                setCurrentRole(this.value);
                updatePosterName();
                renderMessagesPage();
            });

            sendBtn.addEventListener('click', function() {
                var text = msgInput.value.trim();
                if (!text) return;
                var role = roleSelect.value;
                var name = role === 'teacher'
                    ? (localStorage.getItem('dlc_teacher_name') || '')
                    : getStudentName();
                if (!name) {
                    alert(role === 'teacher'
                        ? 'Please set your teacher name on the Teacher Dashboard first.'
                        : 'Please set your name in Settings or Profile first.');
                    return;
                }
                addMessage(text, role);
                msgInput.value = '';
                renderMessagesPage();
            });

            function updatePosterName() {
                var role = roleSelect.value;
                var name = role === 'teacher'
                    ? (localStorage.getItem('dlc_teacher_name') || 'Not set')
                    : (getStudentName() || 'Not set');
                if (posterName) posterName.textContent = 'as ' + name;
            }

            renderMessagesPage();

            // Show user name
            var nameEl = document.getElementById('msgUserName');
            var sName = getStudentName();
            if (nameEl && sName) {
                nameEl.innerHTML = '<span style="font-size:1.4rem;font-weight:700;color:var(--text-primary);">' + sName + '</span>';
            }
        });
    </script>
</body>
</html>
