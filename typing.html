<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typing Practice – Digital Literacy</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/mobile.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <header class="topbar" id="topbar"></header>
      <main class="page-content">
        <div class="card mb-4 fade-in">
          <div class="card-header mb-4">
            <h2 class="section-title">Typing Practice</h2>
            <span class="badge" id="textCounter">Text 1 of 12</span>
          </div>

          <!-- Live stats bar -->
          <div class="grid-3 mb-4" style="gap:12px">
            <div class="stat-card" style="padding:12px">
              <div class="stat-value text-accent" id="timerDisplay">0s</div>
              <div class="stat-label">Time</div>
            </div>
            <div class="stat-card" style="padding:12px">
              <div class="stat-value text-success" id="liveWPM">—</div>
              <div class="stat-label">WPM (live)</div>
            </div>
            <div class="stat-card" style="padding:12px">
              <div class="stat-value" style="color:var(--warning)" id="liveErr">0</div>
              <div class="stat-label">Errors</div>
            </div>
          </div>

          <!-- The text to type -->
          <div class="typing-text" id="typingDisplay"></div>

          <!-- Input -->
          <input
            type="text"
            id="typingInput"
            class="typing-input mt-4"
            placeholder="Click 'Start' then type here…"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            disabled
          />

          <!-- Buttons -->
          <div class="btn-group mt-4">
            <button class="btn btn-primary btn-lg" id="typingStart">▶ Start</button>
            <button class="btn btn-secondary btn-lg hidden" id="typingReset">↺ Reset</button>
          </div>
        </div>

        <!-- Results panel (shown after completion) -->
        <div id="statsPanel" class="hidden"></div>
      </main>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/db.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/wasm.js"></script>
  <script src="js/app.js"></script>
  <script src="js/typing.js"></script>
</body>
</html>
