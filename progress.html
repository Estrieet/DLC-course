<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress | Digital Literacy</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/darkmode.css">
  <link rel="stylesheet" href="css/mobile.css">
</head>
<body class="page-progress">
  <div class="page-shell">
    <header class="topbar">
      <div class="brand">Progress</div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle light and dark mode">Dark mode</button>
    </header>
    <nav class="nav-bar" aria-label="Main navigation">
      <a href="index.html" class="nav-link" data-popup="Welcome home.">Home</a>
      <a href="lessons.html" class="nav-link" data-popup="Learn computer skills step by step.">Lessons</a>
      <a href="typing.html" class="nav-link" data-popup="Practice typing and improve your speed.">Typing Practice</a>
      <a href="quizzes.html" class="nav-link" data-popup="Take a simple quiz.">Quizzes</a>
      <a href="progress.html" class="nav-link" data-popup="See how much you have finished.">Progress</a>
      <a href="teacher.html" class="nav-link" data-popup="Teacher tools for class help.">Teacher</a>
      <a href="admin.html" class="nav-link" data-popup="Manage users and results.">Admin</a>
      <a href="help.html" class="nav-link" data-popup="Get help for the website.">Help</a>
      <a href="settings.html" class="nav-link" data-popup="Change simple settings.">Settings</a>
    </nav>
    <main class="content-card fade-in">
      <h1>Progress Tracker</h1>
      <p class="lead">Track lessons, quizzes, and typing in one simple place.</p>
      <section class="progress-card">
        <div class="progress-item">
          <label>Lessons completed</label>
          <div class="progress-bar"><span id="lessonProgress" class="progress-fill"></span></div>
          <p id="lessonText">0 of 15</p>
        </div>
        <div class="progress-item">
          <label>Quizzes completed</label>
          <div class="progress-bar"><span id="quizProgress" class="progress-fill"></span></div>
          <p id="quizText">0 of 10</p>
        </div>
        <div class="progress-item">
          <label>Typing tests completed</label>
          <div class="progress-bar"><span id="typingProgress" class="progress-fill"></span></div>
          <p id="typingText">0 of 5</p>
        </div>
        <div class="progress-summary">
          <p>Completion: <strong id="completionText">0%</strong></p>
          <button id="resetProgress" class="button button-secondary">Reset Progress</button>
        </div>
      </section>
      <a href="index.html" class="button button-secondary">Return to Home</a>
    </main>
    <footer class="page-footer">
      <p>Progress saves automatically in your browser.</p>
    </footer>
  </div>
  <div class="popup-box" id="popupBox" aria-live="polite"></div>
  <script src="js/main.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/darkmode.js"></script>
  <script src="js/animations.js"></script>
</body>
</html>
