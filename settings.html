<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings – Digital Literacy</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/mobile.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <header class="topbar" id="topbar"></header>
      <main class="page-content">
        <div class="card fade-in" style="max-width:520px">
          <h2 class="section-title mb-6">Settings</h2>
          <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border)">
            <div>
              <div class="font-semibold">Dark Mode</div>
              <div class="text-muted text-sm">Switch between dark and light theme</div>
            </div>
            <button class="btn btn-secondary" id="themeToggleBtn" onclick="toggleTheme()">Toggle</button>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border)">
            <div>
              <div class="font-semibold">Font Size</div>
              <div class="text-muted text-sm">Make text larger for easier reading</div>
            </div>
            <select id="fontSizeSel" class="typing-input" style="width:auto;padding:8px 12px" onchange="saveFontSize(this.value)">
              <option value="16">Normal</option>
              <option value="18">Large</option>
              <option value="20">Extra Large</option>
            </select>
          </div>
          <div style="padding:16px 0">
            <div class="font-semibold mb-2">Reset Progress</div>
            <div class="text-muted text-sm mb-3">This will erase all your lesson and quiz progress.</div>
            <button class="btn btn-danger" onclick="if(confirm('Reset all progress?')){clearProgress();toast('Progress cleared','info');}">Reset All Progress</button>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/db.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/wasm.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      buildTopBar('Settings');
      const sz = localStorage.getItem('dlc_fontSize') || '16';
      document.getElementById('fontSizeSel').value = sz;
      document.documentElement.style.fontSize = sz + 'px';
    });
    function saveFontSize(v) {
      localStorage.setItem('dlc_fontSize', v);
      document.documentElement.style.fontSize = v + 'px';
      toast('Font size updated', 'success');
    }
  </script>
</body>
</html>
