<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz – Digital Literacy</title>
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light');document.documentElement.style.fontSize=(localStorage.getItem('textSize')||'100')+'%';</script>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/mobile.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <header class="topbar" id="topbar"></header>
      <main class="page-content">
        <div id="quizRoot"></div>
        <div class="btn-group mt-4 fade-in">
          <button class="btn btn-primary btn-lg" id="submitBtn" disabled>Submit Answers</button>
        </div>
        <div id="quizResult" class="hidden"></div>
      </main>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/db.js"></script>
  <script src="js/darkmode.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/wasm.js"></script>
  <script src="js/app.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
