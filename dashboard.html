<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – Digital Literacy</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/mobile.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <header class="topbar" id="topbar"></header>
      <main class="page-content">
        <!-- Stat bar -->
        <div class="grid-3 mb-6">
          <div class="stat-card fade-in stagger-1">
            <div class="stat-value text-accent" id="completionPct">0%</div>
            <div class="stat-label">Course Complete</div>
          </div>
          <div class="stat-card fade-in stagger-2">
            <div class="stat-value text-success" id="statLessons">0</div>
            <div class="stat-label">Lessons Done</div>
          </div>
          <div class="stat-card fade-in stagger-3">
            <div class="stat-value" style="color:var(--violet)" id="statWPM">0</div>
            <div class="stat-label">Best WPM</div>
          </div>
        </div>

        <!-- Progress bar -->
        <div class="card mb-6 fade-in stagger-2">
          <div class="card-header mb-3">
            <span class="section-title">Your Progress</span>
            <a href="progress.html" class="btn btn-secondary" style="font-size:0.85rem;padding:6px 14px">View All</a>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="completionBar" style="width:0%"></div>
          </div>
          <p class="text-muted mt-2" id="completionMeta">Loading…</p>
        </div>

        <!-- Lesson grid -->
        <div class="card-header mb-4 fade-in stagger-3">
          <h2 class="section-title">Continue Learning</h2>
          <a href="lessons.html" class="btn btn-secondary" style="font-size:0.85rem;padding:6px 14px">All Lessons</a>
        </div>
        <div class="grid-auto" id="lessonGrid"></div>
      </main>
    </div>
  </div>
  <script src="js/data.js"></script>
  <script src="js/db.js"></script>
  <script src="js/darkmode.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/wasm.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
