<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – Digital Literacy</title>
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light');document.documentElement.style.fontSize=(localStorage.getItem('textSize')||'100')+'%';</script>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/mobile.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <header class="topbar" id="topbar"></header>
      <main class="page-content">
        <div class="grid-3 mb-6">
          <div class="stat-card fade-in stagger-1">
            <div class="stat-value text-accent" id="completionPct">0%</div>
            <div class="stat-label">Course Complete</div>
          </div>
          <div class="stat-card fade-in stagger-2">
            <div class="stat-value" style="color:var(--success-color)" id="statLessons">0</div>
            <div class="stat-label">Lessons Done</div>
          </div>
          <div class="stat-card fade-in stagger-3">
            <div class="stat-value" style="color:var(--violet)" id="statWPM">0</div>
            <div class="stat-label">Best WPM</div>
          </div>
        </div>

        <div class="card mb-6 fade-in stagger-2">
          <div class="card-header mb-3">
            <span style="font-size:1.1rem;font-weight:700;">Your Progress</span>
            <a href="progress.html" class="btn btn-secondary btn-sm">View All</a>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="completionBar" style="width:0%"></div>
          </div>
          <p class="text-muted mt-2" id="completionMeta" style="font-size:0.9rem;">Loading…</p>
        </div>

        <div class="card-header mb-3 fade-in stagger-3">
          <h2 style="font-size:1.2rem;font-weight:700;">Continue Learning</h2>
          <a href="lessons.html" class="btn btn-secondary btn-sm">All Lessons</a>
        </div>
        <div class="grid-auto" id="lessonGrid"></div>
      </main>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/db.js"></script>
  <script src="js/darkmode.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/wasm.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
